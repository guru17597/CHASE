<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfers & Payments</title>
    <style>
        :root { --primary: #08415c; --accent: #007bff; --bg: #f0f2f5; --white: #fff; }
        body { font-family: system-ui; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 414px; background: var(--white); min-height: 100vh; position: relative; padding-bottom: 100px; box-sizing: border-box;}
        
        .header { padding: 30px 25px 10px; background: var(--primary); color: white; text-align: center; }
        
        /* Tab Navigation */
        .tab-bar { display: flex; background: #eef2f7; margin: 20px; border-radius: 12px; padding: 5px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; background: none; color: #666; }
        .tab.active { background: var(--white); color: var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        /* Form Areas */
        .form-container { padding: 0 25px; display: none; }
        .form-container.active { display: block; }
        
        .input-group { margin-bottom: 15px; }
        label { font-size: 0.85rem; font-weight: bold; color: #444; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 14px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .fee-preview { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 0.9rem; line-height: 1.6; }
        .exchange-rate { color: #28a745; font-weight: bold; margin-bottom: 5px; display: block; }
        .tax-note { color: #dc3545; font-size: 0.75rem; display: block; margin-top: 5px; }
        .btn-send { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }

        /* Bottom Nav */
        .nav { position: fixed; bottom: 0; width: 100%; max-width: 414px; background: white; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; z-index: 999; }
        .nav a { text-decoration: none; color: #999; font-size: 0.75rem; text-align: center; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header"><h3>Move Money</h3></div>

        <div class="tab-bar">
            <button class="tab active" onclick="switchTab(event, 'local')">Local</button>
            <button class="tab" onclick="switchTab(event, 'intl')">International</button>
            <button class="tab" onclick="switchTab(event, 'bills')">Bills</button>
        </div>

        <!-- LOCAL TRANSFER -->
        <div id="local" class="form-container active">
            <div class="input-group">
                <label>Select US Bank</label>
                <select id="localBank">
                    <option>JPMorgan Chase</option>
                    <option>Bank of America</option>
                    <option>Wells Fargo</option>
                    <option>Citigroup</option>
                    <option>Goldman Sachs</option>
                    <option>Morgan Stanley</option>
                    <option>U.S. Bancorp</option>
                    <option>PNC Financial Services</option>
                    <option>Truist Financial</option>
                    <option>Capital One</option>
                </select>
            </div>
            <div class="input-group"><label>Account Number</label><input type="number" placeholder="Recipient Account"></div>
            <div class="input-group"><label>Amount ($)</label><input type="number" id="localAmt" oninput="calcFee('local')" placeholder="0.00"></div>
            <div class="fee-preview">
                Service Fee (0.5%): <strong id="localFee">$0.00</strong>
            </div>
            <button class="btn-send" onclick="confirmTx('Local')">Send Local Transfer</button>
        </div>

        <!-- INTERNATIONAL TRANSFER -->
        <div id="intl" class="form-container">
            <div class="input-group">
                <label>Recipient Currency</label>
                <select id="currencySelect" onchange="calcFee('intl')">
                    <option value="0.92">EUR - Euro</option>
                    <option value="0.79">GBP - British Pound</option>
                    <option value="32.42">TWD - Taiwan Dollar</option>
                    <option value="32.05">TRY - Turkish Lira</option>
                    <option value="3.98">PLN - Polish Zloty</option>
                    <option value="151.20">JPY - Japanese Yen</option>
                    <option value="1.36">CAD - Canadian Dollar</option>
                    <option value="1.53">AUD - Australian Dollar</option>
                    <option value="83.35">INR - Indian Rupee</option>
                    <option value="7.23">CNY - Chinese Yuan</option>
                    <option value="1.35">SGD - Singapore Dollar</option>
                </select>
            </div>
            <div class="input-group"><label>Recipient Account Number / IBAN</label><input type="text" placeholder="Enter Account or IBAN"></div>
            <div class="input-group"><label>SWIFT / BIC Code</label><input type="text" placeholder="Bank Identifier Code"></div>
            <div class="input-group"><label>Amount ($)</label><input type="number" id="intlAmt" oninput="calcFee('intl')" placeholder="Minimum $10,000"></div>
            
            <div class="fee-preview">
                <span class="exchange-rate">Recipient Receives: <span id="convertedAmt">0.00</span></span>
                Tax & Exchange Fee (1.8%): <strong id="intlFee">$0.00</strong>
                <span class="tax-note">*This fee is mandatory for cross-border currency conversion.</span>
            </div>
            <button class="btn-send" onclick="confirmTx('International')">Process International Wire</button>
        </div>

        <!-- BILLS -->
        <div id="bills" class="form-container">
            <div class="input-group">
                <label>Biller Category</label>
                <select>
                    <option>Electricity</option>
                    <option>Water & Sewage</option>
                    <option>Internet / Mobile</option>
                </select>
            </div>
            <div class="input-group"><label>Reference Number</label><input type="text" placeholder="Enter Reference"></div>
            <div class="input-group"><label>Amount ($)</label><input type="number" placeholder="0.00"></div>
            <button class="btn-send" onclick="alert('Bill Payment Scheduled')">Pay Bill</button>
        </div>

        <nav class="nav">
            <a href="dashboard.html">🏠<br>Home</a>
            <a href="transfer.html" style="color: var(--accent); font-weight: bold;">💸<br>Transfer</a>
            <a href="settings.html">⚙️<br>Settings</a>
        </nav>
    </div>

    <script>
        function switchTab(evt, tabName) {
            let containers = document.getElementsByClassName("form-container");
            for (let i = 0; i < containers.length; i++) { containers[i].style.display = "none"; }
            let tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) { tabs[i].className = tabs[i].className.replace(" active", ""); }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        function calcFee(type) {
            if(type === 'local') {
                let amt = document.getElementById('localAmt').value || 0;
                document.getElementById('localFee').innerText = "$" + (amt * 0.005).toFixed(2);
            } else {
                let amt = document.getElementById('intlAmt').value || 0;
                let rate = document.getElementById('currencySelect').value;
                let currencyName = document.getElementById('currencySelect').options[document.getElementById('currencySelect').selectedIndex].text;
                let currencyCode = currencyName.split(' - ')[0];
                
                // Calculate 1.8% Tax & Exchange Fee
                let fee = (amt * 0.018).toFixed(2);
                document.getElementById('intlFee').innerText = "$" + fee;
                
                // Calculate Exchange amount (the amount after fee is converted)
                let converted = amt * rate;
                document.getElementById('convertedAmt').innerText = converted.toLocaleString(undefined, {minimumFractionDigits: 2}) + " " + currencyCode;
            }
        }

        function confirmTx(type) {
            if (type === 'International') {
                let amt = parseFloat(document.getElementById('intlAmt').value);
                if (!amt || amt < 10000) {
                    alert("Minimum amount for International Wire is $10,000.00");
                    return;
                }
                
                let tax = (amt * 0.018).toFixed(2);
                let total = (amt + parseFloat(tax)).toFixed(2);
                
                alert("Transfer Processing...\n\nAmount: $" + amt.toLocaleString() + "\nTax & Exchange Fee (1.8%): $" + tax + "\nTotal to be Deducted: $" + total);
            } else {
                let amt = parseFloat(document.getElementById('localAmt').value) || 0;
                alert("Local Transfer of $" + amt.toLocaleString() + " has been initiated.");
            }
        }
    </script>
</body>
</html>
