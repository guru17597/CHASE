<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transfers & Payments</title>
    <style>
        :root { --primary: #08415c; --accent: #007bff; --bg: #f0f2f5; --white: #fff; --error: #dc3545; }
        body { font-family: system-ui; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        .app { width: 100%; max-width: 414px; background: var(--white); min-height: 100vh; position: relative; padding-bottom: 100px; box-sizing: border-box; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
        
        .translate-wrapper { background: var(--primary); padding: 10px; text-align: center; border-bottom: 1px solid #063044; }
        .goog-logo-link, .goog-te-gadget span { display: none !important; }
        .goog-te-gadget { color: transparent !important; font-size: 0 !important; }
        .goog-te-combo { padding: 6px; border-radius: 6px; border: 1px solid var(--white); background: var(--white); font-weight: bold; }

        .header { padding: 25px 25px 10px; background: var(--primary); color: white; text-align: center; }
        .tab-bar { display: flex; background: #eef2f7; margin: 20px; border-radius: 12px; padding: 5px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; background: none; color: #666; }
        .tab.active { background: var(--white); color: var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        .form-container { padding: 0 25px; display: none; }
        .form-container.active { display: block; }
        
        .input-group { margin-bottom: 12px; }
        label { font-size: 0.75rem; font-weight: bold; color: #444; display: block; margin-bottom: 4px; text-transform: uppercase;}
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 0.95rem; }
        input.invalid, select.invalid { border-color: var(--error); background-color: #fff8f8; }
        
        .fee-preview { background: #fdfdfd; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin: 15px 0; font-size: 0.9rem; line-height: 1.6; }
        .exchange-rate { color: #28a745; font-weight: bold; margin-bottom: 5px; display: block; }
        .fee-text { color: var(--error); font-weight: bold; }
        
        .btn-send { background: var(--accent); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }

        /* Loader with "Kindly Be Patient" */
        #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .patient-text { color: var(--primary); font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <p class="patient-text">Connecting to secure server...</p>
        <p style="color: #666; font-size: 0.9rem;">Kindly be patient...</p>
    </div>

    <div class="app">
        <div class="translate-wrapper"><div id="google_translate_element"></div></div>
        <div class="header"><h3>Move Money</h3></div>

        <div class="tab-bar">
            <button class="tab active" onclick="switchTab(event, 'local')">Local</button>
            <button class="tab" onclick="switchTab(event, 'intl')">International</button>
            <button class="tab" onclick="switchTab(event, 'bills')">Bills</button>
        </div>

        <!-- LOCAL -->
        <div id="local" class="form-container active">
            <div class="input-group"><label>Bank Name</label><input type="text" id="localBank" class="required" placeholder="e.g. Chase"></div>
            <div class="input-group"><label>Account Number</label><input type="number" id="localAcc" class="required" placeholder="Account"></div>
            <div class="input-group"><label>Amount ($)</label><input type="number" id="localAmt" class="required" oninput="calcFee('local')" placeholder="0.00"></div>
            <div class="fee-preview">Processing Fee (0.5%): <strong id="localFee" class="fee-text">$0.00</strong></div>
            <button class="btn-send" onclick="confirmTx('Local')">Send Transfer</button>
        </div>

        <!-- INTERNATIONAL -->
        <div id="intl" class="form-container">
            <div class="input-group">
                <label>Recipient Currency</label>
                <select id="currencySelect" class="required" onchange="calcFee('intl')">
                    <option value="">Select Currency</option>
                    <option value="32.05">TRY - Turkish Lira</option>
                    <option value="32.42">TWD - Taiwan Dollar</option>
                    <option value="3.98">PLN - Polish Zloty</option>
                    <option value="1410.50">KRW - Korean Won</option>
                    <option value="0.92">EUR - Euro (Italy/EU)</option>
                    <option value="0.79">GBP - British Pound</option>
                    <option value="7.24">CNY - Chinese Yuan</option>
                    <option value="159.52">JPY - Japanese Yen</option>
                    <option value="83.35">INR - Indian Rupee</option>
                    <option value="1.38">CAD - Canadian Dollar</option>
                    <option value="1.53">AUD - Australian Dollar</option>
                    <option value="1.33">SGD - Singapore Dollar</option>
                    <option value="0.92">CHF - Swiss Franc</option>
                    <option value="18.52">ZAR - South African Rand</option>
                    <option value="3.67">AED - UAE Dirham</option>
                    <option value="3.75">SAR - Saudi Riyal</option>
                    <option value="16.35">MXN - Mexican Peso</option>
                    <option value="4.80">BRL - Brazilian Real</option>
                    <option value="10.82">NOK - Norwegian Krone</option>
                    <option value="10.55">SEK - Swedish Krona</option>
                </select>
            </div>
            <div class="input-group"><label>Receiver Name</label><input type="text" id="intlName" class="required" placeholder="Full Name"></div>
            <div class="input-group"><label>Bank Name</label><input type="text" id="intlBank" class="required" placeholder="Bank Name"></div>
            <div class="input-group"><label>Account Number / IBAN</label><input type="text" id="intlAcc" class="required" placeholder="IBAN"></div>
            <div class="input-group"><label>SWIFT (Optional)</label><input type="text" id="intlSwift" placeholder="Optional"></div>
            <div class="input-group"><label>Amount ($)</label><input type="number" id="intlAmt" class="required" oninput="calcFee('intl')" placeholder="Min $10,000"></div>
            
            <div class="fee-preview">
                <span class="exchange-rate">Recipient Receives: <span id="convertedAmt">0.00</span></span>
                Tax & Exchange Fee (1.8%): <strong id="intlFee" class="fee-text">$0.00</strong>
            </div>
            <button class="btn-send" onclick="confirmTx('International')">Send Wire</button>
        </div>

        <!-- BILLS -->
        <div id="bills" class="form-container">
            <div class="input-group"><label>Biller Name</label><input type="text" class="required" placeholder="Company"></div>
            <div class="input-group"><label>Amount ($)</label><input type="number" class="required" placeholder="0.00"></div>
            <button class="btn-send" onclick="confirmTx('Bill')">Pay Bill</button>
        </div>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'zh-CN,tr,it,ko,pl,es,fr,de,ar,ja,pt'}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//://google.com"></script>

    <script>
        function switchTab(evt, tabName) {
            let containers = document.getElementsByClassName("form-container");
            for (let i = 0; i < containers.length; i++) { containers[i].style.display = "none"; }
            let tabs = document.getElementsByClassName("tab");
            for (let i = 0; i < tabs.length; i++) { tabs[i].className = tabs[i].className.replace(" active", ""); }
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        function calcFee(type) {
            if(type === 'local') {
                let amt = document.getElementById('localAmt').value || 0;
                document.getElementById('localFee').innerText = "$" + (amt * 0.005).toFixed(2);
            } else {
                let amt = document.getElementById('intlAmt').value || 0;
                let rate = document.getElementById('currencySelect').value;
                if(!rate) return;
                document.getElementById('intlFee').innerText = "$" + (amt * 0.018).toFixed(2);
                document.getElementById('convertedAmt').innerText = (amt * rate).toLocaleString(undefined, {minimumFractionDigits: 2});
            }
        }

        function confirmTx(type) {
            let activeId = type === 'International' ? 'intl' : (type === 'Bill' ? 'bills' : 'local');
            let inputs = document.getElementById(activeId).querySelectorAll('.required');
            let isValid = true;

            inputs.forEach(input => {
                if (!input.value.trim()) { input.classList.add('invalid'); isValid = false; } 
                else { input.classList.remove('invalid'); }
            });

            if (!isValid) { alert("Please complete all required fields."); return; }

            if (type === 'International' && parseFloat(document.getElementById('intlAmt').value) < 10000) {
                alert("Minimum amount for International Wire is $10,000.00."); return;
            }

            // Show Loader for 3 Seconds
            document.getElementById('loader').style.display = 'flex';
            
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                alert("NOTICE: Your transfer is currently pending. You must pay your processing fees first to complete this transaction.\n\nPlease contact customer service on WhatsApp: +1 (368) 207-0226 to finalize payment.");
            }, 3000); // 3000ms = 3 seconds
        }
    </script>
</body>
</html>
